query ShopifyCatalogSkus($first: Int!, $after: String) {
  products(first: $first, after: $after) {
    nodes {
      id
      title
      status
      variants(first: 100) {
        nodes {
          id
          sku
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
