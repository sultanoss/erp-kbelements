mutation ExportHerdsetsBulk {
  bulkOperationRunQuery(
    query: """
    {
      products(query: "product_type:Herdset", sortKey: TITLE) {
        edges {
          node {
            id
            legacyResourceId
            handle
            title
            description
            descriptionHtml
            vendor
            productType
            status
            tags
            templateSuffix
            createdAt
            updatedAt
            publishedAt
            onlineStoreUrl
            totalInventory
            tracksInventory
            seo { title description }
            category { id name fullName }
            options { id name position optionValues { id name hasVariants } }
            collections { edges { node { id handle title } } }
            metafields { edges { node { id namespace key type value description } } }
            variants {
              edges {
                node {
                  id
                  legacyResourceId
                  title
                  sku
                  barcode
                  price
                  compareAtPrice
                  availableForSale
                  inventoryQuantity
                  taxable
                  selectedOptions { name value }
                  inventoryItem { id tracked measurement { weight { value unit } } }
                }
              }
            }
          }
        }
      }
    }
    """
  ) {
    bulkOperation { id status }
    userErrors { field message }
  }
}
